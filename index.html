<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ethical AI Principles — Reference Cards</title>
    <style>
        :root {
            --color-text-primary: #1a1a1a;
            --color-text-secondary: #666;
            --color-border-tertiary: #e5e5e5;
            --color-background-primary: #ffffff;
            --color-background-secondary: #f9f9f9;
            --border-radius-lg: 12px;
            --border-radius-md: 8px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background: #f0f2f5; padding: 20px; color: var(--color-text-primary); }
        .wrap { max-width: 800px; margin: 0 auto; background: white; padding: 2rem; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        
        .top-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 12px; }
        .top-bar h2 { font-size: 20px; font-weight: 600; color: var(--color-text-primary); }
        .top-bar p { font-size: 14px; color: var(--color-text-secondary); margin-top: 4px; }
        
        .pill-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1.5rem; }
        .pill { font-size: 12px; font-weight: 500; padding: 6px 16px; border-radius: 99px; cursor: pointer; border: 1px solid transparent; transition: all .2s ease; }
        .pill.inactive { opacity: 0.5; background: #eee; color: #777; }
        .pill.inactive:hover { opacity: 0.8; }
        
        .card { border-radius: var(--border-radius-lg); border: 1px solid var(--color-border-tertiary); background: var(--color-background-primary); overflow: hidden; margin-bottom: 1rem; }
        .card-head { padding: 20px; border-bottom: 1px solid var(--color-border-tertiary); }
        .card-badge { display: inline-flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 600; padding: 4px 12px; border-radius: 99px; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.05em; }
        .card-title { font-size: 22px; font-weight: 700; color: var(--color-text-primary); margin-bottom: 8px; }
        .card-def { font-size: 14px; color: var(--color-text-secondary); line-height: 1.7; }
        
        .section { padding: 16px 20px; border-bottom: 1px solid var(--color-border-tertiary); }
        .section:last-of-type { border-bottom: none; }
        .sec-label { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 12px; }
        
        .risk-item { display: flex; gap: 10px; margin-bottom: 10px; align-items: flex-start; }
        .risk-dot { width: 7px; height: 7px; border-radius: 50%; margin-top: 6px; flex-shrink: 0; }
        .risk-text { font-size: 13px; color: #444; line-height: 1.6; }
        
        .q-item { margin-bottom: 10px; padding: 12px 16px; border-radius: var(--border-radius-md); border-left: 4px solid; background: var(--color-background-secondary); }
        .q-text { font-size: 14px; color: var(--color-text-primary); font-style: italic; line-height: 1.5; }

        .ex-box { background: #f0f7ff; border: 1px solid #cce3ff; padding: 16px; border-radius: var(--border-radius-md); margin-top: 8px; }
        .ex-label { font-size: 11px; font-weight: 800; color: #0056b3; margin-bottom: 6px; display: block; letter-spacing: 0.05em; }
        .ex-text { font-size: 13px; color: #003a7a; line-height: 1.6; }

        .nav-row { display: flex; gap: 10px; justify-content: flex-end; margin-top: 1rem; }
        button { padding: 8px 20px; border-radius: 6px; border: 1px solid #ddd; background: white; cursor: pointer; font-size: 13px; transition: all 0.2s; }
        button:hover { background: #f0f0f0; border-color: #ccc; }
    </style>
</head>
<body>

<div class="wrap">
  <div class="top-bar">
    <div>
      <h2>Ethical AI Principles</h2>
      <p>A detailed reference guide for educators and school leaders</p>
    </div>
  </div>

  <div class="pill-row" id="pills"></div>
  
  <div id="card-area"></div>

  <div class="nav-row">
    <button onclick="nav(-1)">← Previous</button>
    <button onclick="nav(1)">Next →</button>
  </div>
</div>

<script>
const groups = [
  {
    id: 0,
    label: "Principle 1",
    ilke: "Do No Harm",
    bg: "#FCEBEB", border: "#E24B4A", tbg: "#F7C1C1", tc: "#791F1F", dot: "#E24B4A",
    tanim: "AI systems must be designed and used to protect the well-being of individuals and communities. This includes preventing physical and psychological harm, safeguarding human rights, and protecting the environment. In educational contexts, this means ensuring that no AI-driven pedagogical intervention causes developmental setbacks, emotional distress, or safety risks for students. Systems should have clear mechanisms to be stopped if harm is detected.",
    risks: [
      "Misguidance: An AI career tool might steer a student toward the wrong path, causing academic or professional harm.",
      "Emotional Harm: AI chatbots might provide insensitive or harmful responses to a student in an emotional crisis.",
      "Data Leak: Exposure of sensitive or confidential student information to malicious actors either accidentally or as the result of a cyberattack can lead to personal harm"
    ],
    questions: [
      "Could anyone suffer physical, psychological, or cognitive harm as a result of using this system?",
      "Who is vulnerable if this system makes a mistake or fails?",
      "How do I handle a situation where a student receives distressing content from the AI?"
    ],
    example: "A school counselor tests a new mental health chatbot for several weeks in a sandbox environment to ensure it correctly identifies keywords related to self-harm and immediately redirects the user to a human professional."
  },
  {
    id: 1,
    label: "Principle 2",
    ilke: "Proportionality",
    bg: "#FAEEDA", border: "#EF9F27", tbg: "#FAC775", tc: "#633806", dot: "#BA7517",
    tanim: "The use of AI should be limited to what is necessary and appropriate to achieve a legitimate educational aim. Every AI intervention must be evaluated to ensure its benefits outweigh the potential violation on rights. In practice, schools should avoid 'over-automation' and ensure that data collection is kept to a minimum (data minimization). If a non-AI solution is equally effective and less intrusive, it should be preferred.",
    risks: [
      "Over-Surveillance: Systems that record genstures, eye movements, and tone of voice collect data far beyond educational needs.",
      "Privacy Violation: Collecting biometric data for minor tasks creates permanent records.",
      "Data Commodification: Using behavioral data for commercial marketing instead of purely for educational support."
    ],
    questions: [
      "Could we achieve this educational goal using a simpler tool that collects less data?",
      "Is the benefit of this AI feature worth the privacy trade-off for the students?",
      "Do we really need 'real-time' tracking, or would a summary at the end be sufficient?"
    ],
    example: "An elementary school rejects a classroom management AI that uses facial recognition to track student attention levels, deciding that traditional teacher observation is a more proportional and less invasive way to manage engagement."
  },
  {
    id: 2,
    label: "Principle 3",
    ilke: "Non-discrimination",
    bg: "#E6F1FB", border: "#378ADD", tbg: "#B5D4F4", tc: "#0C447C", dot: "#185FA5",
    tanim: "AI systems must be inclusive and equitable, ensuring that they do not create or reinforce biases based on race, gender, language, socio-economic status, or disability. In education, this involves active monitoring to ensure that algorithms do not unfairly group or disadvantage certain students. Developers and educators must ensure that training data represents diverse populations and that outcomes are audited for fairness across all demographic groups.",
    risks: [
      "Algorithmic Bias: Predictive models might assign lower potential to minority students based on historical disadvantages.",
      "Language Bias: Models trained mostly on English data might unfairly penalize students who use different dialects or languages.",
      "Access Gap: Students in regions with poor infrastructure cannot benefit from AI, widening the digital divide.",
    ],
    questions: [
        "Does the system produce systematically different outcomes for different groups of students?",
        "Are all students given equal opportunity to benefit from the tool?",
        "Could the system misinterpret culturally specific expressions?"
    ],
    example: "Before adopting an AI-powered essay grader, a school department runs a pilot test using a diverse sample of essays from students with different linguistic backgrounds to check if the tool systematically scores ESL students lower."
  },
  {
    id: 3,
    label: "Principle 4",
    ilke: "Sustainability",
    bg: "#EAF3DE", border: "#639922", tbg: "#C0DD97", tc: "#27500A", dot: "#3B6D11",
    tanim: "Sustainability covers the environmental, social, and economic impacts of AI. Environmentally, it refers to the energy-intensive nature of training and running large models. Socially, it concerns the preservation of human cognitive skills and social bonds; AI should not lead to the erosion of essential human capabilities. Economically, it means ensuring schools do not become trapped in expensive, unsustainable ecosystems that prioritize profit over educational value.",
    risks: [
      "Carbon Footprint: Large models consume significant energy; deploying them school-wide has a high environmental load.",
      "Vendor Dependency: If a school becomes 100% dependent on one provider, they are vulnerable to price hikes or closures.",
      "Cognitive Deskilling: Over-reliance on AI might lead students to lose foundational thinking and writing skills over time.",
      "Social Impact: Long-term data accumulation might impact a student's future opportunities if used for external scoring."
    ],
    questions: [
      "If this AI tool stops working tomorrow, do our students still have the skills to complete the task manually?",
      "Is the tool supporting durable learning, or short-term efficiency?",
      "Am I using this AI tool because it is pedagogically necessary, or merely convenient?",
      "What is the long-term plan for the data we are generating today?",
      "Is the tool cost-effective over time, or does it create long-term dependency?",
    "Does this tool have a policy regarding environmental sustainability?"
    ],
    example: "A high school curriculum committee integrates 'AI Literacy' into the syllabus, ensuring that students learn the mechanics of writing and problem-solving manually before they are allowed to use generative AI tools to assist them."
  },
  {
    id: 4,
    label: "Principle 5",
    ilke: "Human Agency",
    bg: "#EEEDFE", border: "#7F77DD", tbg: "#CECBF6", tc: "#26215C", dot: "#534AB7",
    tanim: "The final decision-making power must always remain with humans. AI should assist and augment human intelligence, not replace it. In schools, teachers must retain pedagogical authority, and students must be empowered to exercise critical thinking and self-determination. This principle requires 'meaningful human oversight,' where users understand the AI's suggestions but can choose to ignore or override them based on their professional or personal judgment.",
    risks: [
      "Automation Bias: Teachers might stop questioning AI suggestions and just 'rubber-stamp' its decisions.",
      "Dependency:",
      "Right to Appeal: Automated systems often lack a clear path for students to challenge or discuss a result.",
      "Deskilling: Teachers who delegate all feedback to AI may lose their professional diagnostic intuition over time."
    ],
    questions: [
      "Does the student know how to appeal a grade or a decision made with the help of AI?",
      "Does the AI serve the teacher, or is the teacher just an operator for the AI?",
       "In which moments do I accept, modify, or reject AI outputs?",
       "Are students actively engaging with learning, or passively relying on AI outputs?"
    ],
    example: "A university policy states that AI-assisted grading tools can only provide a 'suggested grade.' The instructor must manually review the AI's feedback and enter the final grade personally to maintain human responsibility."
  },
  {
    id: 5,
    label: "Principle 6",
    ilke: "Transparency",
    bg: "#E1F5EE", border: "#1D9E75", tbg: "#9FE1CB", tc: "#04342C", dot: "#0F6E56",
    tanim: "Users must be informed when they are interacting with AI, and the logic behind AI decisions should be understandable (explainability). Transparency ensures that students and parents understand how personal data is processed and used. For educational software, this means vendors must provide clear documentation on how algorithms work, and schools must be open about their AI policies. 'Explainability' allows a student to understand why a specific recommendation or score was generated.",
    risks: [
      "Black Box Assessment: If a student doesn't know why they got a low score, they can't learn or improve.",
      "Informed Consent: Parents might not know what data is being harvested or for what purpose.",
      "Exclusion of Expertise: If teachers don't understand the logic, they can't spot errors or technical hallucinations.",
      "Opaque Providers: Commercial secrets shouldn't prevent independent audits of tools used in education."
    ],
    questions: [
      "Can the AI explain its reasoning in a way that a student or parent can understand?",
      "Have we clearly informed students when they are interacting with an AI rather than a human?",
      "Is the documentation for this tool clear about what data is shared with third parties?"
    ],
    example: "A math teacher explains to the class that the AI tutor they are using tracks their speed and accuracy to suggest specific practice problems, and provides a 'Help' button that shows exactly which skills the AI thinks the student needs to work on."
  }
];

let current = 0;

function renderPills() {
  const el = document.getElementById('pills');
  el.innerHTML = groups.map((g, i) => `
    <span class="pill ${i === current ? 'active' : 'inactive'}" 
          style="background:${i === current ? g.tbg : '#eee'}; color:${i === current ? g.tc : '#777'}; border-color:${i === current ? g.border : 'transparent'}" 
          onclick="select(${i})">${g.ilke}</span>`).join('');
}

function renderCard() {
  const g = groups[current];
  document.getElementById('card-area').innerHTML = `
  <div class="card">
    <div class="card-head">
      <div class="card-badge" style="background:${g.tbg}; color:${g.tc}">${g.label}</div>
      <div class="card-title">${g.ilke}</div>
      <div class="card-def">${g.tanim}</div>
    </div>
    <div class="card-body">
      <div class="section">
        <div class="sec-label" style="color:${g.dot}">Potential Risks of Violation</div>
        ${g.risks.map(r => `<div class="risk-item"><div class="risk-dot" style="background:${g.dot}"></div><div class="risk-text">${r}</div></div>`).join('')}
      </div>
      <div class="section">
        <div class="sec-label" style="color:${g.dot}">Reflection Questions</div>
        ${g.questions.map(q => `<div class="q-item" style="border-color:${g.dot}"><div class="q-text">"${q}"</div></div>`).join('')}
      </div>
      <div class="section" style="background:#fcfcfc">
        <div class="ex-box">
          <span class="ex-label">SCHOOL / CLASSROOM EXAMPLE</span>
          <p class="ex-text">${g.example}</p>
        </div>
      </div>
    </div>
  </div>`;
}

function select(i) { current = i; renderPills(); renderCard(); }
function nav(d) { select((current + d + 6) % 6); }

renderPills();
renderCard();
</script>

</body>
</html>
