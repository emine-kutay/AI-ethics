<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ethical AI Principles</title>
    <style>
        :root {
            --color-text-primary: #1a1a1a;
            --color-text-secondary: #666;
            --color-border-tertiary: #e5e5e5;
            --color-background-primary: #ffffff;
            --color-background-secondary: #f9f9f9;
            --border-radius-lg: 12px;
            --border-radius-md: 8px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background: #f0f2f5; padding: 20px; color: var(--color-text-primary); }
        .wrap { max-width: 800px; margin: 0 auto; background: white; padding: 2rem; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        
        .top-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 12px; }
        .top-bar h2 { font-size: 20px; font-weight: 600; color: var(--color-text-primary); }
        .top-bar p { font-size: 14px; color: var(--color-text-secondary); margin-top: 4px; }
        
        .pill-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1.5rem; }
        .pill { font-size: 12px; font-weight: 500; padding: 6px 16px; border-radius: 99px; cursor: pointer; border: 1px solid transparent; transition: all .2s ease; }
        .pill.inactive { opacity: 0.5; background: #eee; color: #777; }
        .pill.inactive:hover { opacity: 0.8; }
        
        .card { border-radius: var(--border-radius-lg); border: 1px solid var(--color-border-tertiary); background: var(--color-background-primary); overflow: hidden; margin-bottom: 1rem; }
        .card-head { padding: 20px; border-bottom: 1px solid var(--color-border-tertiary); }
        .card-badge { display: inline-flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 600; padding: 4px 12px; border-radius: 99px; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.05em; }
        .card-title { font-size: 22px; font-weight: 700; color: var(--color-text-primary); margin-bottom: 8px; }
        .card-def { font-size: 14px; color: var(--color-text-secondary); line-height: 1.7; }
        
        .section { padding: 16px 20px; border-bottom: 1px solid var(--color-border-tertiary); }
        .section:last-of-type { border-bottom: none; }
        .sec-label { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 12px; }
        
        .risk-item { display: flex; gap: 10px; margin-bottom: 10px; align-items: flex-start; }
        .risk-dot { width: 7px; height: 7px; border-radius: 50%; margin-top: 6px; flex-shrink: 0; }
        .risk-text { font-size: 13px; color: #444; line-height: 1.6; }
        
        .q-item { margin-bottom: 10px; padding: 12px 16px; border-radius: var(--border-radius-md); border-left: 4px solid; background: var(--color-background-secondary); }
        .q-text { font-size: 14px; color: var(--color-text-primary); font-style: italic; line-height: 1.5; }

        .ex-box { background: #f0f7ff; border: 1px solid #cce3ff; padding: 16px; border-radius: var(--border-radius-md); margin-top: 8px; }
        .ex-label { font-size: 11px; font-weight: 800; color: #0056b3; margin-bottom: 6px; display: block; letter-spacing: 0.05em; }
        .ex-text { font-size: 13px; color: #003a7a; line-height: 1.6; }

        .nav-row { display: flex; gap: 10px; justify-content: flex-end; margin-top: 1rem; }
        button { padding: 8px 20px; border-radius: 6px; border: 1px solid #ddd; background: white; cursor: pointer; font-size: 13px; transition: all 0.2s; }
        button:hover { background: #f0f0f0; border-color: #ccc; }
    </style>
</head>
<body>

<div class="wrap">
  <div class="top-bar">
    <div>
      <h2>Ethical AI Principles</h2>
    </div>
  </div>

  <div class="pill-row" id="pills"></div>
  
  <div id="card-area"></div>

  <div class="nav-row">
    <button onclick="nav(-1)">← Previous</button>
    <button onclick="nav(1)">Next →</button>
  </div>
</div>

<script>
const groups = [
  {
    id: 0,
    label: "Principle 1",
    ilke: "Do No Harm",
    bg: "#FCEBEB", border: "#E24B4A", tbg: "#F7C1C1", tc: "#791F1F", dot: "#E24B4A",
    tanim: "AI systems must be designed and used to protect the well-being of individuals and communities. This includes preventing physical and psychological harm. In educational contexts, this involves monitoring for emotional attachment, social pressure, and the erosion of human connection in learning environments.",
    risks: [
      "Emotional & psychological harm: AI chatbots might provide insensitive or harmful responses to a student in an emotional crisis.",
      "Privacy: Exposure of sensitive or confidential student information to malicious actors either accidentally or as the result of a cyberattack can lead to personal harm."
    ],
    questions: [
      "Could anyone suffer psychological, emotional, or cognitive harm as a result of using this system?",
      "How do I handle a situation where a student receives distressing content from the AI?"
    ],
    example: "A school counselor tests a new mental health chatbot for several weeks in a sandbox environment to ensure it correctly identifies keywords related to self-harm and immediately redirects the user to a human professional.",
  },
  {
    id: 1,
    label: "Principle 2",
    ilke: "Proportionality",
    bg: "#FAEEDA", border: "#EF9F27", tbg: "#FAC775", tc: "#633806", dot: "#BA7517",
    tanim: "The use of AI should be limited to what is necessary and appropriate. Schools should avoid intrusive monitoring and ensure that data collection remains proportional to educational needs. 'Safety' framing should not be used to justify excessive surveillance that inhibits student self-expression.",
    risks: [
        "Over-Surveillance: Systems that record genstures, eye movements, and tone of voice collect data far beyond educational needs.",
        "Privacy: Collecting biometric data for minor tasks creates permanent records; Using behavioral data for commercial marketing instead of purely for educational support."
    ],
    questions: [
      "Could we achieve this educational goal using a simpler tool that collects less data?",
      "Is the benefit of this AI feature worth the privacy trade-off for the students?",
      "Do we really need 'real-time' tracking, or would a summary at the end be sufficient?"
    ],
    example: "An elementary school rejects a classroom management AI that uses facial recognition to track student attention levels, deciding that traditional teacher observation is a more proportional and less invasive way to manage engagement."
  },
  {
    id: 2,
    label: "Principle 3",
    ilke: "Non-discrimination",
    bg: "#E6F1FB", border: "#378ADD", tbg: "#B5D4F4", tc: "#0C447C", dot: "#185FA5",
    tanim: "AI systems must be inclusive and equitable. This involves ensuring that algorithms do not unfairly disadvantage minority groups or penalize students with disabilities and diverse linguistic backgrounds through narrow training data.",
    risks: [
      "Inequality: Algorithmic bias disadvantages minority groups in assessments or recommendations.",
       "Access Gap: Rural and low-income schools lack access to AI tools, widening the inequality gap."
      
    ],
    questions: [
        "Does the system produce systematically different outcomes for different groups of students?",
        "Are all students given equal opportunity to benefit from the tool?",
        "Could the system misinterpret culturally specific expressions?"
    ],
    example: "Before adopting an AI-powered essay grader, a school department runs a pilot test using a diverse sample of essays from students with different linguistic backgrounds to check if the tool systematically scores ESL students lower."
  },
  {
    id: 3,
    label: "Principle 4",
    ilke: "Sustainability",
    bg: "#EAF3DE", border: "#639922", tbg: "#C0DD97", tc: "#27500A", dot: "#3B6D11",
    tanim: "Sustainability covers the long-term environmental, economic, and social costs of integrating AI. It requires schools to consider the carbon footprint of models and the risks of vendor dependency.",
    risks: [
      "Environmental Impact: Large AI models have significant carbon footprints that impact environmental health.",
      "Economic Impact: Over-dependence on commercial vendors creates fragility and economic risk for schools.",
       "Social Impact: Long-term data accumulation might impact a student's future opportunities if used for external scoring."
    ],
    questions: [
      "What is the long-term environmental impact of deploying this large-scale AI model?",
     "Is the tool cost-effective over time, or does it create long-term dependency?",
    "Am I using this AI tool because it is pedagogically necessary, or merely convenient?",
        "Does this tool have a policy regarding environmental sustainability?"
    ],
    example: "A high school curriculum committee integrates 'AI Literacy' into the syllabus, ensuring that students learn the mechanics of writing and problem-solving manually before they are allowed to use generative AI tools to assist them."
  },
  {
    id: 4,
    label: "Principle 5",
    ilke: "Human Agency",
    bg: "#EEEDFE", border: "#7F77DD", tbg: "#CECBF6", tc: "#26215C", dot: "#534AB7",
    tanim: "The final decision-making power must remain with humans. AI challenges what it means for work to be genuinely a student's own. Educators must define and detect misuse while ensuring that assessment design adapts to maintain academic honesty and human authorship.",
    risks: [
      "Academic integrity: Students submit AI-generated work as their own, undermining human authorship.",
      "Deskilling: Teachers who delegate all feedback to AI may lose their professional diagnostic intuition over time.; Student skills erode when AI replaces thinking rather than supporting it."
    ],
    questions: [
      "How do we define 'original work' in an environment where AI assistance is readily available?",
      "Are students actively engaging with learning, or passively relying on AI outputs?",
      "In which moments do teachers/students accept, modify, or reject AI outputs?"
    ],
    example: "A university policy states that AI-assisted grading tools can only provide a 'suggested grade.' The instructor must manually review the AI's feedback and enter the final grade personally to maintain human responsibility."
  },
  {
    id: 2,
    id: 5,
    label: "Principle 6",
    ilke: "Transparency",
    bg: "#E1F5EE", border: "#1D9E75", tbg: "#9FE1CB", tc: "#04342C", dot: "#0F6E56",
    tanim: "Users must be informed about how their data is accessed and secured. Transparency is required to prevent exposure of excessive personal data and to ensure that tech companies are held accountable for their data practices regarding student privacy.",
    risks: [
      "Privacy: Platforms collect far more personal data than needed for learning purposes.; Third-party vendors may access or sell student data without clear disclosure.",
      "Over-Surveillance: Systems that record genstures, eye movements, and tone of voice collect data far beyond educational needs."
    ],
    questions: [
        "Can the vendor explain why they need access to specific student data beyond the core educational task?",
        "Are students and parents fully informed about exactly what data points are being collected?",
        "Have we clearly informed students and parents when they are interacting with an AI rather than a human?",
        "Is the documentation for the tool clear about what data is shared with third parties?"
    ],
    example: "A math teacher explains to the class that the AI tutor they are using tracks their speed and accuracy to suggest specific practice problems, and provides a 'Help' button that shows exactly which skills the AI thinks the student needs to work on."
  }
];

let current = 0;

function renderPills() {
  const el = document.getElementById('pills');
  el.innerHTML = groups.map((g, i) => `
    <span class="pill ${i === current ? 'active' : 'inactive'}" 
          style="background:${i === current ? g.tbg : '#eee'}; color:${i === current ? g.tc : '#777'}; border-color:${i === current ? g.border : 'transparent'}" 
          onclick="select(${i})">${g.ilke}</span>`).join('');
}

function renderCard() {
  const g = groups[current];
  document.getElementById('card-area').innerHTML = `
  <div class="card">
    <div class="card-head">
      <div class="card-badge" style="background:${g.tbg}; color:${g.tc}">${g.label}</div>
      <div class="card-title">${g.ilke}</div>
      <div class="card-def">${g.tanim}</div>
    </div>
    <div class="card-body">
      <div class="section">
        <div class="sec-label" style="color:${g.dot}">Potential Risks of Violation</div>
        ${g.risks.map(r => `<div class="risk-item"><div class="risk-dot" style="background:${g.dot}"></div><div class="risk-text">${r}</div></div>`).join('')}
      </div>
      <div class="section">
        <div class="sec-label" style="color:${g.dot}">Reflection Questions</div>
        ${g.questions.map(q => `<div class="q-item" style="border-color:${g.dot}"><div class="q-text">"${q}"</div></div>`).join('')}
      </div>
      <div class="section" style="background:#fcfcfc">
        <div class="ex-box">
          <span class="ex-label">SCHOOL / CLASSROOM EXAMPLE</span>
          <p class="ex-text">${g.example}</p>
        </div>
      </div>
    </div>
  </div>`;
}

function select(i) { current = i; renderPills(); renderCard(); }
function nav(d) { select((current + d + 6) % 6); }

renderPills();
renderCard();
</script>

</body>
</html>
